# Run an Azure CLI command to display the current subscription.
# This requires jq is installed.
#[custom.azure]
#style = "blue"
#command="az account show -o json |jq -r .tenantDisplayName"
#when="true"
#format="on [$symbol $output]($style)"
#symbol="¯»ÿ"

[character]
success_symbol = "[ÔØ»](bold blue)"

[azure]
disabled = false
symbol="¯»ÿ "

[azure.subscription_aliases]
"TechWolf Main Subscription" = "production"
"Azure subscription 1" = "dev"


# custom module for jj status
[custom.jj]
ignore_timeout = true
description = "The current jj status"
when = "jj root"
symbol = "´Éÿ "
style = "purple"
format = "on [$symbol($output )]($style)"
shell = ["sh", "--noprofile", "--norc"]
command = '''
jj log --ignore-working-copy --no-graph --color always -r @ -T '
            separate(
                " ",
                bookmarks.join(", "),
                coalesce(
                    surround(
                        "\"",
                        "\"",
                        if(
                            description.first_line().substr(0, 24).starts_with(description.first_line()),
                            description.first_line().substr(0, 24),
                            description.first_line().substr(0, 23) ++ "ÔÇª"
                        )
                    ),
                    "(no description)"
                ),
                change_id.shortest(),
                commit_id.shortest(),
                if(conflict, "(conflict)"),
                if(empty, "(empty)"),
                if(divergent, "(divergent)"),
                if(hidden, "(hidden)"),
        )'
'''

