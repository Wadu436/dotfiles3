##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Clipse
windowrule = match:class clipse, float on
windowrule = match:class clipse, size 622 652
windowrule = match:class clipse, stay_focused on

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}


# disable animations for slurp so grim doesn't capture it
layerrule = no_anim on, match:namespace selection


# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

windowrule = float on, match:class com.saivert.pwvucontrol
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = float on, match:class steam, match:title Friends List
windowrule = float on, match:class steam, match:title Steam Settings

windowrule = monitor DP-1, match:class steam_app_.*
windowrule = workspace 10, match:class steam_app_.*
windowrule = fullscreen on, match:class steam_app_.*

